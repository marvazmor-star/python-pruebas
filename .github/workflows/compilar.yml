name: Compilar Executable Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar PyInstaller limpio
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Compilar script a EXE
      run: |
        pyinstaller --onefile --clean xls2pdf.py

    - name: Subir el ejecutable finalizado a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: conversor-excel-pdf
        path: dist/xls2pdf.exe
