name: Compilar Executable Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite compilar manualmente haciendo clic en un botón

jobs:
  build:
    runs-on: windows-latest # Ejecuta el servidor en Windows para que compile un .exe de Windows

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar librerias y PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compilar script a EXE
      run: |
        pyinstaller --onefile conversor.py

    - name: Subir el ejecutable finalizado a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: conversor-excel-pdf
        path: dist/conversor.exe
