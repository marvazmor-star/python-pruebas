name: Compilar Executable Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Actualizado a v4.2.2 (compatible con Node 24)
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4.2.2

    # Actualizado a v5.3.0 (compatible con Node 24)
    - name: Configurar Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'

    - name: Instalar PyInstaller limpio
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Compilar script a EXE
      run: |
        pyinstaller --onefile --noconsole --clean xls2pdf.py

    - name: Subir el ejecutable finalizado a GitHub
      uses: actions/upload-artifact@v4
      with:
        name: conversor-excel-pdf
        path: dist/xls2pdf.exe
